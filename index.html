<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>夏令营抓娃娃机｜稳定街机版</title>
<style>
:root{
  --bg:#061812;
  --panel:rgba(255,255,255,.10);
  --line:rgba(255,255,255,.20);
  --text:#fff;
  --muted:rgba(255,255,255,.70);
  --green:#5cff9d;
  --yellow:#ffd84d;
  --orange:#ff9f43;
  --pink:#ff5ec4;
  --blue:#55d7ff;
  --purple:#a984ff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 10%,rgba(92,255,157,.22),transparent 25%),
    radial-gradient(circle at 85% 10%,rgba(255,94,196,.18),transparent 24%),
    linear-gradient(135deg,#05120d,#071823 55%,#12091a);
  overflow-x:hidden;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:42px 42px;
}
.app{
  width:min(1280px,100%);
  margin:0 auto;
  padding:22px;
  position:relative;
  z-index:1;
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:18px;
  margin-bottom:18px;
}
.badge{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.08);
  color:var(--green);
  font-weight:1000;
  letter-spacing:.08em;
}
h1{
  margin:10px 0 0;
  font-size:clamp(42px,6vw,82px);
  line-height:.92;
  letter-spacing:-2px;
  text-shadow:0 0 24px rgba(92,255,157,.38);
}
.sub{
  margin-top:12px;
  color:rgba(255,255,255,.86);
  font-size:clamp(15px,2vw,21px);
  font-weight:850;
}
.topRight{
  display:flex;
  gap:12px;
  align-items:flex-start;
}
.stats{
  display:grid;
  grid-template-columns:repeat(4,110px);
  gap:10px;
}
.stat{
  min-height:90px;
  border-radius:22px;
  border:1px solid var(--line);
  background:linear-gradient(160deg,rgba(255,255,255,.15),rgba(255,255,255,.06));
  padding:14px;
  box-shadow:0 16px 45px rgba(0,0,0,.25);
}
.stat .label{font-size:12px;color:var(--muted);font-weight:850}
.stat .value{font-size:30px;font-weight:1000;margin-top:6px}
.iconBtn{
  width:58px;
  height:58px;
  border:0;
  border-radius:20px;
  font-size:26px;
  cursor:pointer;
  color:white;
  background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.07));
  border:1px solid var(--line);
  box-shadow:0 12px 35px rgba(0,0,0,.28);
}
.layout{
  display:grid;
  grid-template-columns:1fr 390px;
  gap:20px;
  align-items:start;
}
.machineOuter{
  border-radius:38px;
  padding:16px;
  background:linear-gradient(145deg,rgba(92,255,157,.16),rgba(255,94,196,.08),rgba(85,215,255,.10));
  border:1px solid rgba(255,255,255,.20);
  box-shadow:0 24px 70px rgba(0,0,0,.35);
}
.machine{
  min-height:730px;
  border-radius:30px;
  overflow:hidden;
  background:linear-gradient(180deg,#56b65c 0%,#2f783f 12%,#132b21 12.5%,#0b1b16 100%);
  box-shadow:inset 0 0 0 5px rgba(255,255,255,.12), inset 0 -30px 60px rgba(0,0,0,.32);
}
.marquee{
  height:96px;
  display:grid;
  grid-template-columns:170px 1fr 76px;
  gap:12px;
  align-items:center;
  padding:16px 18px;
  background:linear-gradient(180deg,#c3ff73,#3fb45b 58%,#206b3a);
  border-bottom:5px solid rgba(0,0,0,.28);
}
.coinBox,.timer,.sound{
  height:60px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:1000;
  box-shadow:inset 0 3px 10px rgba(255,255,255,.38), inset 0 -6px 12px rgba(0,0,0,.18);
}
.coinBox{background:#fff4b8;color:#4d3610;font-size:20px}
.timer{
  background:#06140f;
  color:#d2ff75;
  font-size:42px;
  letter-spacing:3px;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  text-shadow:0 0 18px rgba(200,255,105,.85);
  border:2px solid rgba(255,255,255,.12);
}
.timer.danger{color:var(--yellow);animation:pulse .45s infinite alternate}
@keyframes pulse{to{transform:scale(1.04);filter:brightness(1.25)}}
.sound{border:0;background:#ffe27b;color:#593b08;font-size:23px;cursor:pointer}
.glass{
  position:relative;
  width:calc(100% - 46px);
  height:440px;
  margin:20px auto 0;
  border-radius:28px;
  overflow:hidden;
  border:5px solid rgba(255,255,255,.32);
  background:
    linear-gradient(120deg,rgba(255,255,255,.25),transparent 20%,transparent 70%,rgba(255,255,255,.14)),
    linear-gradient(180deg,rgba(177,232,255,.58),rgba(34,100,69,.92));
  box-shadow:inset 0 0 40px rgba(255,255,255,.18),0 18px 34px rgba(0,0,0,.28);
}


.fairLights{
  position:absolute;
  z-index:13;
  pointer-events:none;
  opacity:0;
}
.glass.playing .fairLights{opacity:1}
.topLights,.bottomLights{
  left:14px;
  right:14px;
  height:22px;
  border-radius:999px;
  background:
    radial-gradient(circle,#fff8bc 0 4px,#ffd84d 5px 8px,transparent 9px),
    radial-gradient(circle,#ffd5f4 0 4px,#ff5ec4 5px 8px,transparent 9px),
    radial-gradient(circle,#d9f7ff 0 4px,#55d7ff 5px 8px,transparent 9px),
    radial-gradient(circle,#dcffe9 0 4px,#5cff9d 5px 8px,transparent 9px);
  background-size:88px 22px;
  background-position:0 0,22px 0,44px 0,66px 0;
  animation:bulbRunX .9s steps(4,end) infinite;
  filter:drop-shadow(0 0 8px rgba(255,216,77,.55));
}
.topLights{top:10px}
.bottomLights{bottom:10px}
.leftLights,.rightLights{
  top:28px;
  bottom:28px;
  width:22px;
  border-radius:999px;
  background:
    radial-gradient(circle,#fff8bc 0 4px,#ffd84d 5px 8px,transparent 9px),
    radial-gradient(circle,#ffd5f4 0 4px,#ff5ec4 5px 8px,transparent 9px),
    radial-gradient(circle,#d9f7ff 0 4px,#55d7ff 5px 8px,transparent 9px),
    radial-gradient(circle,#dcffe9 0 4px,#5cff9d 5px 8px,transparent 9px);
  background-size:22px 88px;
  background-position:0 0,0 22px,0 44px,0 66px;
  animation:bulbRunY .9s steps(4,end) infinite;
  filter:drop-shadow(0 0 8px rgba(85,215,255,.55));
}
.leftLights{left:10px}
.rightLights{right:10px}
@keyframes bulbRunX{
  0%{background-position:0 0,22px 0,44px 0,66px 0;filter:brightness(1)}
  25%{background-position:22px 0,44px 0,66px 0,88px 0;filter:brightness(1.25)}
  50%{background-position:44px 0,66px 0,88px 0,110px 0;filter:brightness(1)}
  75%{background-position:66px 0,88px 0,110px 0,132px 0;filter:brightness(1.25)}
  100%{background-position:88px 0,110px 0,132px 0,154px 0;filter:brightness(1)}
}
@keyframes bulbRunY{
  0%{background-position:0 0,0 22px,0 44px,0 66px;filter:brightness(1)}
  25%{background-position:0 22px,0 44px,0 66px,0 88px;filter:brightness(1.25)}
  50%{background-position:0 44px,0 66px,0 88px,0 110px;filter:brightness(1)}
  75%{background-position:0 66px,0 88px,0 110px,0 132px;filter:brightness(1.25)}
  100%{background-position:0 88px,0 110px,0 132px,0 154px;filter:brightness(1)}
}
.glass.playing{
  box-shadow:inset 0 0 40px rgba(255,255,255,.22),0 18px 34px rgba(0,0,0,.28),0 0 34px rgba(92,255,157,.20);
}

.rail{
  position:absolute;
  left:8%;
  right:8%;
  top:20px;
  height:17px;
  border-radius:999px;
  background:linear-gradient(180deg,#d1d8cf,#657166);
  box-shadow:0 8px 18px rgba(0,0,0,.30);
  z-index:8;
}
.sign{
  position:absolute;
  right:24px;
  top:60px;
  z-index:3;
  width:126px;
  height:92px;
  border-radius:12px;
  transform:rotate(5deg);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#32673a;
  background:#d8bd82;
  border:4px solid #876132;
  font-size:18px;
  font-weight:1000;
  box-shadow:0 12px 18px rgba(0,0,0,.24);
}
.claw{
  position:absolute;
  left:calc(var(--x,50) * 1%);
  top:calc(var(--y,15) * 1%);
  width:112px;
  height:155px;
  transform:translate(-50%,-28%) scale(var(--scale,1));
  transform-origin:top center;
  z-index:10;
  transition:left .12s linear,top .12s linear,transform .12s linear;
  pointer-events:none;
}
.rope{
  position:absolute;
  left:50%;
  top:-36px;
  width:12px;
  height:105px;
  transform:translateX(-50%);
  border-radius:999px;
  background:linear-gradient(90deg,#303b32,#c7c7c7,#303b32);
  transition:height .6s ease;
  z-index:1;
}
.claw.dropping .rope{height:196px}
.claw.dropping{animation:drop .75s ease-in-out}
@keyframes drop{
  0%{transform:translate(-50%,-28%) scale(var(--scale,1))}
  45%{transform:translate(-50%,8%) scale(var(--scale,1))}
  100%{transform:translate(-50%,-28%) scale(var(--scale,1))}
}
.head{
  position:absolute;
  left:50%;
  top:43px;
  transform:translateX(-50%);
  width:72px;
  height:60px;
  border-radius:14px;
  background:linear-gradient(180deg,#d9d9d9,#5e5e5e);
  box-shadow:inset 0 8px 10px rgba(255,255,255,.38),0 10px 16px rgba(0,0,0,.35);
  z-index:2;
}
.arm{
  position:absolute;
  top:90px;
  width:18px;
  height:74px;
  border-radius:999px;
  background:linear-gradient(180deg,#d8d8d8,#555);
  transform-origin:top center;
}
.arm.left{left:29px;transform:rotate(28deg)}
.arm.right{right:29px;transform:rotate(-28deg)}
.arm.mid{left:47px;height:62px}
.plush{
  position:absolute;
  left:calc(var(--dx) * 1%);
  top:calc(var(--dy) * 1%);
  transform:translate(-50%,-50%);
  width:96px;
  height:108px;
  display:grid;
  place-items:center;
  z-index:4;
  animation:floaty 2.4s ease-in-out infinite alternate;
}
.plush:nth-child(even){animation-duration:2.9s}
@keyframes floaty{to{margin-top:-9px}}
.plush.target{filter:drop-shadow(0 0 18px rgba(255,216,77,.95))}
.plush.target .toy{outline:4px solid rgba(255,216,77,.85)}
.plush.caught{animation:caught .85s ease forwards;z-index:11}
@keyframes caught{
  0%{transform:translate(-50%,-50%) scale(1)}
  55%{transform:translate(-50%,-165%) scale(1.12)}
  100%{transform:translate(-50%,-235%) scale(.9);opacity:0}
}
.plush.fail{animation:fail .55s ease}
@keyframes fail{
  0%,100%{transform:translate(-50%,-50%) rotate(0)}
  25%{transform:translate(-50%,-44%) rotate(-12deg)}
  55%{transform:translate(-50%,-39%) rotate(13deg)}
}
.toy{
  position:relative;
  width:82px;
  height:90px;
  border-radius:36px 36px 30px 30px;
  background:linear-gradient(180deg,var(--c1),var(--c2));
  box-shadow:0 16px 18px rgba(0,0,0,.20), inset 0 6px 14px rgba(255,255,255,.34);
  border:3px solid rgba(255,255,255,.48);
}
.toy:before,.toy:after{
  content:"";
  position:absolute;
  top:-8px;
  width:24px;
  height:26px;
  border-radius:50%;
  background:linear-gradient(180deg,var(--c1),var(--c2));
  border:3px solid rgba(255,255,255,.38);
}
.toy:before{left:7px}
.toy:after{right:7px}
.face{
  position:absolute;
  left:50%;
  top:34px;
  transform:translateX(-50%);
  font-size:25px;
  white-space:nowrap;
}
.belly{
  position:absolute;
  left:50%;
  bottom:8px;
  transform:translateX(-50%);
  width:44px;
  height:27px;
  border-radius:50%;
  background:rgba(255,255,255,.5);
}
.cape{
  position:absolute;
  right:-16px;
  top:38px;
  width:30px;
  height:36px;
  background:var(--cape,#ffd84d);
  clip-path:polygon(0 0,100% 20%,80% 100%,10% 80%);
}
.badgeMark{
  position:absolute;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  font-size:20px;
  z-index:2;
}

.aimReticle{
  position:absolute;
  left:calc(var(--aim-x,50) * 1%);
  top:calc(var(--aim-y,76) * 1%);
  width:58px;
  height:58px;
  transform:translate(-50%,-50%);
  z-index:9;
  pointer-events:none;
  opacity:.9;
  transition:left .08s linear, top .08s linear, opacity .2s ease;
}
.aimReticle:before,
.aimReticle:after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
}
.aimReticle:before{
  width:54px;
  height:54px;
  border:3px solid rgba(255,216,77,.85);
  box-shadow:0 0 18px rgba(255,216,77,.55), inset 0 0 14px rgba(255,216,77,.18);
}
.aimReticle:after{
  width:9px;
  height:9px;
  background:#ffd84d;
  box-shadow:0 0 14px rgba(255,216,77,.95);
}
.aimReticle .h,
.aimReticle .v{
  position:absolute;
  background:rgba(255,216,77,.9);
  border-radius:999px;
}
.aimReticle .h{left:0;right:0;top:50%;height:2px;transform:translateY(-50%)}
.aimReticle .v{top:0;bottom:0;left:50%;width:2px;transform:translateX(-50%)}
.aimReticle.idle{opacity:.28}

.status.hiddenStatus{display:none!important}
.status{
  position:absolute;
  left:20px;
  right:20px;
  bottom:18px;
  z-index:12;
  padding:14px 18px;
  border-radius:22px;
  background:rgba(0,0,0,.48);
  border:1px solid rgba(255,255,255,.20);
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  font-weight:950;
}
.status .hint{color:var(--green)}
.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  padding:22px 24px 28px;
}
.arcadePanel{
  border-radius:30px;
  padding:18px;
  background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.18);
}
.joystickArea{
  display:grid;
  place-items:center;
  gap:12px;
}
.joystick{
  position:relative;
  width:190px;
  height:190px;
  border-radius:50%;
  background:radial-gradient(circle at 45% 38%,rgba(255,255,255,.20),rgba(255,255,255,.08) 38%,rgba(0,0,0,.30) 39%,rgba(0,0,0,.38));
  border:2px solid rgba(255,255,255,.18);
  box-shadow:inset 0 12px 26px rgba(0,0,0,.36),0 18px 34px rgba(0,0,0,.28);
  touch-action:none;
}
.joystick.active{
  box-shadow:inset 0 12px 26px rgba(0,0,0,.36),0 0 0 5px rgba(92,255,157,.18),0 0 28px rgba(92,255,157,.25),0 18px 34px rgba(0,0,0,.28);
}
.joyGuide{
  position:absolute;
  color:rgba(255,255,255,.46);
  font-weight:1000;
  font-size:22px;
  pointer-events:none;
  user-select:none;
}
.joyGuide.up{left:50%;top:14px;transform:translateX(-50%)}
.joyGuide.down{left:50%;bottom:14px;transform:translateX(-50%)}
.joyGuide.left{left:18px;top:50%;transform:translateY(-50%)}
.joyGuide.right{right:18px;top:50%;transform:translateY(-50%)}
.joyKnob{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:58px;
  height:58px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 25%,#fff,#ff5ec4 35%,#b01b75);
  box-shadow:0 10px 0 #5d0d3d,0 16px 24px rgba(0,0,0,.34),inset 0 4px 9px rgba(255,255,255,.44);
  pointer-events:none;
}
.grabArea{
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:12px;
}
.grabBtn{
  width:126px;
  height:126px;
  border:0;
  border-radius:50%;
  cursor:pointer;
  color:#4b3107;
  font-size:42px;
  font-weight:1000;
  background:linear-gradient(180deg,#fff1a0,#ffb12d);
  box-shadow:0 14px 0 #b76612,0 22px 32px rgba(0,0,0,.32),inset 0 4px 10px rgba(255,255,255,.48);
}
.grabBtn:disabled,.mainBtn:disabled{opacity:.38;filter:grayscale(.7);cursor:not-allowed}
.caption{font-size:15px;color:rgba(255,255,255,.85);font-weight:900;text-align:center}
.mainBtn{
  border:0;
  border-radius:22px;
  padding:15px 18px;
  font-size:17px;
  font-weight:1000;
  cursor:pointer;
  background:linear-gradient(180deg,var(--yellow),var(--orange));
  color:#4b3107;
  box-shadow:0 8px 0 rgba(136,76,10,.9),0 15px 24px rgba(0,0,0,.28);
}
.mainBtn.green{background:linear-gradient(180deg,#baff72,var(--green));color:#062217;box-shadow:0 8px 0 rgba(13,99,54,.9),0 15px 24px rgba(0,0,0,.28)}
.mainBtn.blue{background:linear-gradient(180deg,#9ce8ff,#43bdff);color:#06203a;box-shadow:0 8px 0 rgba(14,88,130,.9),0 15px 24px rgba(0,0,0,.28)}
.mainBtn.pink{background:linear-gradient(180deg,#ffc4f1,#ff5ec4);color:#40102f;box-shadow:0 8px 0 rgba(139,29,95,.9),0 15px 24px rgba(0,0,0,.28)}
.mainBtn.ghost{background:rgba(255,255,255,.1);color:white;box-shadow:none;border:1px solid rgba(255,255,255,.25)}
.side{display:flex;flex-direction:column;gap:16px}
.card{
  border-radius:28px;
  padding:20px;
  background:linear-gradient(160deg,rgba(255,255,255,.15),rgba(255,255,255,.06));
  border:1px solid var(--line);
  box-shadow:0 18px 55px rgba(0,0,0,.28);
}
.card h2,.card h3{margin:0 0 14px;font-size:24px}
.inputRow{display:flex;gap:10px;margin-bottom:12px}
input,select{
  width:100%;
  min-width:0;
  border:1px solid rgba(255,255,255,.22);
  border-radius:18px;
  padding:14px 16px;
  background:rgba(255,255,255,.10);
  color:white;
  outline:none;
  font-size:16px;
  font-weight:850;
}
option{color:#132018}
input::placeholder{color:rgba(255,255,255,.48)}
.btnStack{display:grid;gap:12px}
.miniText{color:var(--muted);font-weight:830;line-height:1.55}
.history{display:flex;flex-direction:column;gap:10px;max-height:260px;overflow:auto;padding-right:4px}
.record,.playerChip{
  border-radius:18px;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.14);
  padding:12px;
  font-size:14px;
  line-height:1.35;
  color:rgba(255,255,255,.86);
}
.record b{color:white}
.playerChip{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  font-weight:900;
  margin-top:8px;
}
.playerChip .sub{color:var(--muted);font-size:13px}
.coinPop{
  position:fixed;
  right:28px;
  top:28px;
  z-index:50;
  pointer-events:none;
  width:92px;
  height:92px;
  border-radius:50%;
  display:grid;
  place-items:center;
  font-size:44px;
  background:radial-gradient(circle at 35% 25%,#fff8bf,#ffd84d 48%,#d77b12);
  box-shadow:0 0 30px rgba(255,216,77,.48),0 14px 36px rgba(0,0,0,.32);
  animation:coinPop .72s cubic-bezier(.2,.9,.2,1) forwards;
}
@keyframes coinPop{
  0%{transform:translateY(-18px) scale(.7);opacity:0}
  35%{opacity:1}
  70%{transform:translateY(0) scale(1.08)}
  100%{transform:translateY(-8px) scale(.9);opacity:0}
}
.modal{
  position:fixed;
  inset:0;
  z-index:100;
  background:rgba(0,0,0,.66);
  display:none;
  align-items:center;
  justify-content:center;
  padding:22px;
}
.modal.show{display:flex}
.dialog{
  width:min(620px,100%);
  max-height:90vh;
  overflow:auto;
  border-radius:36px;
  padding:28px;
  background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(235,255,230,.98));

<script>
const CONFIG = { tokenPerInvite:1, tokenPerPlay:1, roundSeconds:30, moveStep:6 };

const REWARD_POOL = {
  Common:[["小零食","🍬"],["水果补给","🍉"],["英雄贴纸","🌟"]],
  Rare:[["饮料补给券","🧋"],["小玩偶","🧸"],["今日幸运推荐官","🏅"]],
  Legendary:[["神秘礼物","🎁"],["夏令营召集大师徽章","👑"],["隐藏大奖","🌈"]]
};

let state = {
  touchCount:0,
  playCount:0,
  winCount:0,
  failCount:0,
  players:{},
  history:[],
  dolls:[],
  gifts:[]
};

let game = {
  isPlaying:false,
  isDropping:false,
  timeLeft:CONFIG.roundSeconds,
  timer:null,
  clawX:50,
  clawY:15,
  sound:true,
  activePlayer:"匿名英雄",
  joystickRAF:null
};

const $ = id => document.getElementById(id);

function saveState(){
  localStorage.setItem("summerClawStableV1", JSON.stringify(state));
}

function loadState(){
  const raw = localStorage.getItem("summerClawStableV1");
  if(!raw) return;
  try{
    const parsed = JSON.parse(raw);
    state = { ...state, ...parsed };
    if(!state.dolls) state.dolls = [];
    if(!state.gifts) state.gifts = [];
    if(!state.players) state.players = {};
    if(!state.history) state.history = [];
  }catch(e){}
}

function normalizeName(){
  return $("playerName").value.trim() || "匿名英雄";
}

function ensurePlayer(name = normalizeName()){
  if(!state.players[name]){
    state.players[name] = { tokens:0, invites:0, plays:0, wins:0, fails:0 };
  }
  return state.players[name];
}

function readPlayer(name = normalizeName()){
  return state.players[name] || { tokens:0, invites:0, plays:0, wins:0, fails:0 };
}

function addHistory(text){
  const time = new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
  state.history.unshift({ id:Date.now(), time, text });
  state.history = state.history.slice(0,80);
}

function randomPalette(type){
  const palettes = {
    Common:[
      ["#ffd06b","#bf7339","#ffd84d"],
      ["#91e0ff","#4a9ef5","#52d7ff"],
      ["#ffb7e8","#ff6bbf","#ff5ec4"],
      ["#e9c68a","#a66a38","#ffd84d"],
      ["#d8c5ff","#8a65d8","#a984ff"],
      ["#ffffff","#7aa7b8","#52d7ff"]
    ],
    Rare:[
      ["#9ce8ff","#4a63ff","#52d7ff"],
      ["#d8c5ff","#8a65d8","#a984ff"],
      ["#ffcf59","#f28b2c","#ffd84d"],
      ["#ff9ad5","#bf3f95","#ff5ec4"]
    ],
    Legendary:[
      ["#fff2a5","#ff9f43","#ff5ec4"],
      ["#ffffff","#2f3340","#ff5959"],
      ["#baff72","#37e88f","#ffd84d"],
      ["#ffd7f2","#7a5cff","#52d7ff"]
    ]
  };
  const pool = palettes[type] || palettes.Common;
  return pool[Math.floor(Math.random() * pool.length)];
}

function toyHTML(d){
  return `<div class="toy" style="--c1:${d.c1};--c2:${d.c2};--cape:${d.cape}">
    <div class="cape"></div>
    <div class="face">${d.face || "●ᴥ●"}</div>
    <div class="belly"></div>
    <div class="badgeMark">${d.icon || "⭐"}</div>
  </div>`;
}

function renderDolls(){
  const box = $("dolls");
  box.innerHTML = "";
  state.dolls.forEach((d,i)=>{
    const el = document.createElement("div");
    el.className = "plush";
    el.id = `doll-${i}`;
    el.style.setProperty("--dx", d.x);
    el.style.setProperty("--dy", d.y);
    el.innerHTML = toyHTML(d);
    el.title = `${d.name}｜${d.rewardType}｜${d.chance}%`;
    box.appendChild(el);
  });
}

function updateUI(){
  const name = normalizeName();
  const player = readPlayer(name);
  $("tokenStat").textContent = player.tokens;
  $("coinsTop").textContent = player.tokens;
  $("touchStat").textContent = state.touchCount;
  $("playStat").textContent = state.playCount;
  $("dollStat").textContent = state.dolls.length;
  $("playerInfo").textContent = `当前玩家：${name}｜代币 ${player.tokens}｜邀请 ${player.invites}`;

  $("timer").textContent = "00:" + String(game.timeLeft).padStart(2,"0");
  $("timer").classList.toggle("danger", game.isPlaying && game.timeLeft <= 10);

  const canStart = !game.isPlaying && !game.isDropping && player.tokens > 0 && state.dolls.length > 0;
  $("startBtn").disabled = !canStart;
  $("startSideBtn").disabled = !canStart;
  $("grabBtn").disabled = !(game.isPlaying && !game.isDropping);
  $("againBtn").disabled = !(player.tokens > 0 && state.dolls.length > 0);

  updateClaw();
  updateHistory();
  updatePlayerList();
  updateToyList();
  saveState();
}

function updateHistory(){
  const box = $("history");
  const list = state.history.slice(0,10);
  box.innerHTML = list.length
    ? list.map(r=>`<div class="record"><b>${r.time}</b>　${r.text}</div>`).join("")
    : `<div class="record">还没有记录。完成一次有效邀请，就能获得第一枚代币。</div>`;
}

function getRankings(){
  return Object.entries(state.players)
    .filter(([_,p])=>p.invites>0 || p.tokens>0 || p.plays>0 || p.wins>0 || p.fails>0)
    .sort((a,b)=>(b[1].invites-a[1].invites)||(b[1].wins-a[1].wins)||(b[1].plays-a[1].plays));
}

function updatePlayerList(){
  const arr = getRankings().slice(0,5);
  $("playerList").innerHTML = arr.length
    ? arr.map(([name,p],i)=>`<div class="playerChip">
        <div><div>${i+1}. ${name}</div><div class="sub">邀请 ${p.invites}｜抓取 ${p.plays}｜抓中 ${p.wins}</div></div>
        <div>⭐ ${p.tokens}</div>
      </div>`).join("")
    : `<div class="miniText">还没有玩家记录。</div>`;
}

function giftRemaining(gift){
  const inMachine = state.dolls.filter(d=>d.giftId === gift.id).length;
  return Math.max(0, Number(gift.total || 0) - Number(gift.claimed || 0) - inMachine);
}

function updateToyList(){
  const toyBox = $("toyList");
  if(toyBox){
    toyBox.innerHTML = state.dolls.length
      ? state.dolls.map((d,i)=>`<div class="toyRow">
          <div style="font-size:28px">${d.icon}</div>
          <div>${d.name}<br><span style="font-size:13px;color:#5d735f">${d.giftName || d.name}</span></div>
          <button class="mainBtn ghost" style="color:#17351f;padding:10px 12px" onclick="removeDoll(${i})">删除</button>
        </div>`).join("")
      : `<div class="miniText">娃娃机为空。</div>`;
  }

  const giftBox = $("giftList");
  if(giftBox){
    giftBox.innerHTML = state.gifts.length
      ? state.gifts.map((g,i)=>{
          const remaining = giftRemaining(g);
          return `<div class="toyRow">
            <div style="font-size:28px">${g.icon}</div>
            <div>${g.name}<br><span style="font-size:13px;color:#5d735f">剩余 ${remaining} / 总数 ${g.total}</span></div>
            <button class="mainBtn ghost" style="color:#17351f;padding:10px 12px" onclick="removeGift(${i})">删除</button>
          </div>`;
        }).join("")
      : `<div class="miniText">礼品库为空。</div>`;
  }

  const select = $("giftSelect");
  if(select){
    const available = state.gifts.filter(g=>giftRemaining(g)>0);
    select.innerHTML = available.length
      ? available.map(g=>`<option value="${g.id}">${g.icon} ${g.name}｜剩余 ${giftRemaining(g)}</option>`).join("")
      : `<option value="">暂无可生成礼品</option>`;
  }
}

function showCoinPop(){
  const el = document.createElement("div");
  el.className = "coinPop";
  el.textContent = "⭐";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),760);
}

function toast(msg){
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove("show"),1800);
}


let bgmTimer = null;
let bgmStep = 0;

function startBGM(){
  if(!game.sound || bgmTimer) return;
  const notes = [523.25,659.25,783.99,659.25,587.33,698.46,880,698.46];
  bgmStep = 0;
  bgmTimer = setInterval(()=>{
    beep(notes[bgmStep % notes.length], .07);
    bgmStep++;
  }, 230);
}

function stopBGM(){
  if(bgmTimer){
    clearInterval(bgmTimer);
    bgmTimer = null;
  }
}

function setPlayingLights(on){
  const glass = document.querySelector(".glass");
  if(glass) glass.classList.toggle("playing", !!on);
}

let audioCtx;
function beep(freq=520,dur=.08){
  if(!game.sound) return;
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = "sine";
    gain.gain.value = .04;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(.0001, audioCtx.currentTime + dur);
    osc.stop(audioCtx.currentTime + dur);
  }catch(e){}
}

function addInvite(){
  const name = normalizeName();
  const p = ensurePlayer(name);
  p.tokens += CONFIG.tokenPerInvite;
  p.invites += 1;
  state.touchCount += 1;
  addHistory(`${name} 完成一次有效邀请，获得 ⭐ 代币 ×1`);
  showCoinPop();
  toast(`${name} 获得 1 枚代币！`);
  beep(520,.08);
  updateUI();
}

function startRound(){
  if(game.isPlaying || game.isDropping) return;
  const name = normalizeName();
  game.activePlayer = name;
  const p = ensurePlayer(name);

  if(state.dolls.length === 0){
    toast("机台里还没有娃娃，请先点击右上角设置添加。");
    return;
  }

  if(p.tokens <= 0){
    toast(`${name} 的代币不足。完成一次有效邀请即可获得代币。`);
    beep(180,.15);
    return;
  }

  p.tokens -= CONFIG.tokenPerPlay;
  p.plays += 1;
  state.playCount += 1;
  game.isPlaying = true;
  game.isDropping = false;
  game.timeLeft = CONFIG.roundSeconds;
  game.clawX = 50;
  game.clawY = 15;

  $("statusText").textContent = "";
  showCoinPop();
  beep(660,.08);
  startBGM();
  setPlayingLights(true);
  startTimer();
  updateUI();
}

function startTimer(){
  clearInterval(game.timer);
  game.timer = setInterval(()=>{
    game.timeLeft -= 1;
    if(game.timeLeft === 10) beep(760,.08);
    if(game.timeLeft <= 0){
      clearInterval(game.timer);
      $("statusText").textContent = "";
      toast("时间到！爪子自动下降！");
      grab();
    }
    updateUI();
  },1000);
}

function updateClaw(){
  const scale = .96 + (game.clawY / 100) * .12;
  $("claw").style.setProperty("--x", game.clawX);
  $("claw").style.setProperty("--y", game.clawY);
  $("claw").style.setProperty("--scale", scale.toFixed(2));
  updateAimReticle();

  document.querySelectorAll(".plush").forEach(el=>el.classList.remove("target"));
  const target = nearestDoll();
  if(target && game.isPlaying && !game.isDropping){
    const idx = state.dolls.indexOf(target);
    const el = $(`doll-${idx}`);
    if(el) el.classList.add("target");
    const p = landingPoint();
    const dist = Math.round(distance(p.x,p.y,target.x,target.y));
    $("targetText").textContent = "";
  }else{
    $("targetText").textContent = "";
  }
}

function distance(ax,ay,bx,by){
  return Math.hypot(ax-bx, ay-by);
}

function nearestDoll(){
  if(!state.dolls.length) return null;
  const p = landingPoint();
  return state.dolls.reduce((best,d)=>{
    return distance(p.x,p.y,d.x,d.y) < distance(p.x,p.y,best.x,best.y) ? d : best;
  }, state.dolls[0]);
}

function distanceBonus(d){
  // 准星只用于选择目标娃娃，不再影响最终成功率。
  // 最终是否抓中，严格使用该娃娃在设置中填写的“抓到几率 %”。
  return 0;
}

function clamp(v,min,max){
  return Math.max(min, Math.min(max, v));
}

function landingPoint(){
  // 爪子本体限制在中上方；这个函数把“前后深度”映射到娃娃堆区域。
  const t = (game.clawY - 12) / (42 - 12);
  return {
    x: game.clawX,
    y: clamp(64 + t * 27, 64, 91)
  };
}

function updateAimReticle(){
  const reticle = $("aimReticle");
  if(!reticle) return;
  const p = landingPoint();
  reticle.style.setProperty("--aim-x", p.x);
  reticle.style.setProperty("--aim-y", p.y);
  reticle.classList.toggle("idle", !game.isPlaying || game.isDropping);
}

function grab(){
  if(!game.isPlaying || game.isDropping) return;

  clearInterval(game.timer);
  stopBGM();
  game.isDropping = true;
  $("statusText").textContent = "";
  $("claw").classList.add("dropping");
  beep(260,.18);
  updateUI();

  const doll = nearestDoll();
  if(!doll) return;

  const idx = state.dolls.indexOf(doll);
  const dollEl = $(`doll-${idx}`);
  const name = game.activePlayer;
  const p = ensurePlayer(name);

  setTimeout(()=>{
    const finalRate = clamp(Number(doll.chance) || 50, 5, 95);
    const success = Math.random() * 100 < finalRate;

    if(success){
      p.wins += 1;
      state.winCount += 1;
      if(dollEl) dollEl.classList.add("caught");
      const reward = { name:doll.giftName || doll.name, icon:doll.giftIcon || doll.icon, rarity:doll.rewardType };
      state.dolls.splice(idx,1);
      const gift = state.gifts.find(g=>g.id === doll.giftId);
      if(gift) gift.claimed = Number(gift.claimed || 0) + 1;
      addHistory(`${name} 抓到 ${doll.icon} ${doll.name}，获得 ${reward.icon} ${reward.name}`);
      setTimeout(()=>{
        renderDolls();
        showSuccess(doll,reward);
      },520);
      beep(880,.12);
      setTimeout(()=>beep(1180,.16),120);
    }else{
      p.fails += 1;
      state.failCount += 1;
      if(dollEl) dollEl.classList.add("fail");
      addHistory(`${name} 差一点抓到 ${doll.icon} ${doll.name}`);
      setTimeout(()=>showFail(doll),520);
      beep(180,.18);
    }

    setTimeout(()=>{
      $("claw").classList.remove("dropping");
      document.querySelectorAll(".plush").forEach(el=>el.classList.remove("caught","fail","target"));
      game.isPlaying = false;
      game.isDropping = false;
      game.timeLeft = CONFIG.roundSeconds;
      game.clawX = 50;
      game.clawY = 15;
      setPlayingLights(false);
      $("statusText").textContent = "";
      updateUI();
    },760);
  },850);
}

function pickRewardByType(type){
  const pool = REWARD_POOL[type] || REWARD_POOL.Common;
  const r = pool[Math.floor(Math.random()*pool.length)];
  return { name:r[0], icon:r[1], rarity:type };
}

function showSuccess(doll,reward){
  const box = $("resultBox");
  box.classList.toggle("legendary", reward.rarity === "Legendary");
  $("resultTitle").textContent = "抓到了！";
  $("resultToy").innerHTML = toyHTML(doll);
  $("resultDesc").innerHTML = `${game.activePlayer} 抓到了：<b>${doll.icon} ${doll.name}</b>`;
  $("rewardBox").innerHTML = `${reward.icon} ${reward.name}`;
  $("resultModal").classList.add("show");
}

function showFail(doll){
  $("resultBox").classList.remove("legendary");
  $("resultTitle").textContent = "差一点点！";
  $("resultToy").innerHTML = toyHTML(doll);
  $("resultDesc").innerHTML = `${game.activePlayer} 差一点抓到：<b>${doll.icon} ${doll.name}</b>`;
  $("rewardBox").innerHTML = "娃娃还在机台里，下一次可以继续挑战。";
  $("resultModal").classList.add("show");
}

function closeResult(){
  $("resultModal").classList.remove("show");
  updateUI();
}

function addGift(){
  const name = $("giftName").value.trim() || "神秘礼品";
  const icon = $("giftIcon").value.trim() || "🎁";
  const rewardType = $("giftType").value;
  const total = clamp(Number($("giftTotal").value) || 1, 1, 999);
  const chance = clamp(Number($("giftChance").value) || 50, 5, 95);
  const dollName = $("giftDollName").value.trim() || name;

  state.gifts.push({
    id:"gift-" + Date.now(),
    name,
    icon,
    rewardType,
    total,
    claimed:0,
    chance,
    dollName
  });

  $("giftName").value = "";
  $("giftIcon").value = "";
  $("giftTotal").value = "1";
  $("giftChance").value = "50";
  $("giftDollName").value = "";
  toast(`已加入礼品库：${icon} ${name}`);
  updateUI();
}

function generateDollsFromGift(){
  const giftId = $("giftSelect").value;
  const gift = state.gifts.find(g=>g.id === giftId);
  if(!gift){
    toast("请先选择礼品。");
    return;
  }

  const requested = clamp(Number($("generateCount").value) || 1, 1, 99);
  const remaining = giftRemaining(gift);

  if(remaining <= 0){
    toast("该礼品已没有剩余库存。");
    return;
  }

  const count = Math.min(requested, remaining);

  for(let i=0;i<count;i++){
    const colors = randomPalette(gift.rewardType);
    state.dolls.push({
      id:"doll-" + Date.now() + "-" + Math.random().toString(16).slice(2),
      giftId:gift.id,
      name:gift.dollName || gift.name,
      icon:gift.icon,
      giftName:gift.name,
      giftIcon:gift.icon,
      rewardType:gift.rewardType,
      chance:gift.chance,
      x:clamp(14 + Math.random()*72, 12, 88),
      y:clamp(66 + Math.random()*24, 64, 91),
      c1:colors[0],
      c2:colors[1],
      face:"●ᴥ●",
      cape:colors[2]
    });
  }

  renderDolls();
  toast(`已生成 ${count} 个娃娃`);
  updateUI();
}

function removeGift(i){
  const gift = state.gifts[i];
  if(!gift) return;
  if(state.dolls.some(d=>d.giftId === gift.id)){
    if(!confirm("这个礼品已有娃娃在机台中，删除礼品库项目不会删除已生成娃娃。继续？")) return;
  }
  state.gifts.splice(i,1);
  updateUI();
}

function removeDoll(i){
  state.dolls.splice(i,1);
  renderDolls();
  updateUI();
}

function download(filename, content, type){
  const blob = new Blob([content],{type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function resetData(){
  if(!confirm("确定要重置今日数据吗？")) return;
  state = { touchCount:0, playCount:0, winCount:0, failCount:0, players:{}, history:[], dolls:[], gifts:[] };
  clearInterval(game.timer);
  stopBGM();
  setPlayingLights(false);
  game.isPlaying = false;
  game.isDropping = false;
  game.timeLeft = CONFIG.roundSeconds;
  game.clawX = 50;
  game.clawY = 15;
  renderDolls();
  toast("今日数据已重置。");
  updateUI();
}

function initJoystick(){
  const joy = $("joystick");
  const knob = $("joyKnob");
  let active = false;
  let raf = null;
  let vec = {x:0,y:0};
  const max = 58;

  function setKnob(x,y){
    knob.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
  }

  function updateFromPointer(e){
    const r = joy.getBoundingClientRect();
    const cx = r.left + r.width/2;
    const cy = r.top + r.height/2;
    let dx = e.clientX - cx;
    let dy = e.clientY - cy;
    const len = Math.hypot(dx,dy);
    if(len > max){
      dx = dx / len * max;
      dy = dy / len * max;
    }
    vec.x = dx / max;
    vec.y = dy / max;
    setKnob(dx,dy);
  }

  function tick(){
    if(!active) return;
    if(game.isPlaying && !game.isDropping){
      const deadzone = .10;
      const vx = Math.abs(vec.x) < deadzone ? 0 : vec.x;
      const vy = Math.abs(vec.y) < deadzone ? 0 : vec.y;
      const sensitivity = CONFIG.moveStep * .34;
      game.clawX = clamp(game.clawX + vx * sensitivity, 8, 92);
      game.clawY = clamp(game.clawY + vy * sensitivity, 12, 42);
      updateClaw();
    }
    raf = requestAnimationFrame(tick);
  }

  function end(){
    if(!active) return;
    active = false;
    joy.classList.remove("active");
    vec = {x:0,y:0};
    setKnob(0,0);
    if(raf) cancelAnimationFrame(raf);
    raf = null;
  }

  joy.addEventListener("pointerdown", e=>{
    e.preventDefault();
    if(!game.isPlaying || game.isDropping) return;
    active = true;
    joy.classList.add("active");
    joy.setPointerCapture(e.pointerId);
    updateFromPointer(e);
    beep(340,.025);
    tick();
  });

  joy.addEventListener("pointermove", e=>{
    if(active) updateFromPointer(e);
  });

  joy.addEventListener("pointerup", end);
  joy.addEventListener("pointercancel", end);
  joy.addEventListener("pointerleave", end);
}

function bind(){
  $("settingsBtn").onclick = openSettingsWithPassword;
  $("confirmPasswordBtn").onclick = confirmSettingsPassword;
  $("closePasswordBtn").onclick = () => $("passwordModal").classList.remove("show");
  $("settingsPassword").addEventListener("keydown", e=>{ if(e.key === "Enter") confirmSettingsPassword(); });
  $("closeSettingsBtn").onclick = () => $("settingsModal").classList.remove("show");
  $("addGiftBtn").onclick = addGift;
  $("generateDollBtn").onclick = generateDollsFromGift;

  $("playerName").addEventListener("input", updateUI);
  $("addInviteBtn").onclick = addInvite;
  $("startBtn").onclick = startRound;
  $("startSideBtn").onclick = startRound;
  $("grabBtn").onclick = grab;
  $("againBtn").onclick = () => { closeResult(); startRound(); };
  $("closeModalBtn").onclick = closeResult;

  $("rankBtn").onclick = showRank;
  $("closeRankBtn").onclick = () => $("rankModal").classList.remove("show");
  $("exportRankBtn").onclick = exportRankCSV;

  $("allPlayersBtn").onclick = showAllPlayers;
  $("closeAllPlayersBtn").onclick = () => $("allPlayersModal").classList.remove("show");
  $("exportAllPlayersBtn").onclick = exportAllPlayersCSV;

  $("exportBtn").onclick = exportJSON;
  $("resetBtn").onclick = resetData;

  $("soundBtn").onclick = () => {
    game.sound = !game.sound;
    if(!game.sound) stopBGM();
    $("soundBtn").textContent = game.sound ? "🔊" : "🔇";
    toast(game.sound ? "音效已开启" : "音效已关闭");
  };

  window.addEventListener("keydown", e=>{
    if(!game.isPlaying || game.isDropping) return;
    if(e.key === "ArrowLeft") game.clawX = clamp(game.clawX - CONFIG.moveStep, 8, 92);
    if(e.key === "ArrowRight") game.clawX = clamp(game.clawX + CONFIG.moveStep, 8, 92);
    if(e.key === "ArrowUp") game.clawY = clamp(game.clawY - CONFIG.moveStep, 12, 42);
    if(e.key === "ArrowDown") game.clawY = clamp(game.clawY + CONFIG.moveStep, 12, 42);
    if(e.key === " "){ e.preventDefault(); grab(); }
    updateClaw();
  });

  initJoystick();
}

loadState();
renderDolls();
bind();
updateUI();
